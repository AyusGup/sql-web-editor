version: "3.8"

services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: sql_backend
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy  
    volumes:
      - shared_logs:/app/logs
    command: sh -c "node dist/scripts/init-superadmin.js && node dist/index.js"
    restart: always
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 128M
    cpu_shares: 1024
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
  cleanup:
    build:
      context: worker
      dockerfile: Dockerfile
    container_name: cleanup_worker
    ports:
      - "3001:3001"
    env_file:
      - worker/.env
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy  
    volumes:
      - shared_logs:/app/logs
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    cpu_shares: 512
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
  postgres:
    image: postgres:17-alpine
    container_name: ciphersql_postgres
    command: >
      postgres
      -c statement_timeout=5000
      -c idle_in_transaction_session_timeout=10000
      -c max_connections=20
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c maintenance_work_mem=16MB
      -c effective_cache_size=128MB
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ciphersqlstudio_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - sandboxdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 96M
    cpu_shares: 1024
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
  mongodb:
    image: mongo:7
    container_name: ciphersql_mongo
    command: ["--wiredTigerCacheSizeGB", "0.25"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    cpu_shares: 512
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
  redis:
    image: redis:7-alpine
    container_name: ciphersql_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "48mb", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    cpu_shares: 256
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

volumes:
  sandboxdata:
  mongodata:
  redisdata:
  shared_logs:
